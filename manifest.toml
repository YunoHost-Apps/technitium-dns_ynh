#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "technitium-dns"
name = "Technitium DNS"
description.en = "DNS server for privacy and security"
description.fr = "Serveur DNS pour la confidentialité et la sécurité"

version = "14.3.0~ynh1"

maintainers = ["Navan Chauhan"]

[upstream]
license = "GPL-3.0-only"
website = "https://technitium.com/dns/"
admindoc = "https://technitium.com/dns/help.html"
userdoc = "https://technitium.com/dns/help.html"
code = "https://github.com/TechnitiumSoftware/DnsServer"
cpe = "cpe:2.3:a:technitium:dnsserver"
fund = "https://patreon.com/technitium"

[integration]
yunohost = ">= 12.1.18"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = false

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources.main]
    url = "https://download.technitium.com/dns/archive/14.3.0/DnsServerPortable.tar.gz"
    sha256 = "9b2deaa54378e5abef1917907876ef2d0c89e0b6d09fc494e6a799b6316adea7"
    in_subdir = false
    # Careful, this autoupdate does not put the right asset, it only serves as a notification!
    autoupdate.strategy = "latest_github_tag"
    autoupdate.asset = "tarball"
    autoupdate.needs_manual_tweaks = true

    [resources.sources.dotnet]
    amd64.url = "https://builds.dotnet.microsoft.com/dotnet/aspnetcore/Runtime/8.0.22/aspnetcore-runtime-8.0.22-linux-x64.tar.gz"
    amd64.sha256 = "8850a0b40a91d72f3d68b3a3a1f2faf9fb086573177e66aed8dedcf6fd295aec"
    arm64.url = "https://builds.dotnet.microsoft.com/dotnet/aspnetcore/Runtime/8.0.22/aspnetcore-runtime-8.0.22-linux-arm64.tar.gz"
    arm64.sha256 = "110a531808e0b9814ea59cc9b205542dec1ea9d00f2586457c586bc5d28aa461"
    armhf.url = "https://builds.dotnet.microsoft.com/dotnet/aspnetcore/Runtime/8.0.22/aspnetcore-runtime-8.0.22-linux-arm.tar.gz"
    armhf.sha256 = "c84f3e66b59f025c51155ea8bc59aca3134efa4eb534bf9a6bc09a2afc817c45"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.data_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 5380
